<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>기억해줘 — 리마인더</title>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e10;
    --surface: #17171a;
    --surface2: #1f1f24;
    --border: #2a2a30;
    --accent: #d4a853;
    --accent2: #e8c880;
    --text: #e8e6e0;
    --text-muted: #7a7870;
    --text-dim: #4a4840;
    --danger: #c45c5c;
    --green: #6aaa7e;
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 16px 80px;
  }

  /* Grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
    opacity: 0.5;
  }

  header {
    width: 100%;
    max-width: 560px;
    margin-bottom: 40px;
    text-align: center;
  }

  .logo-mark {
    font-family: 'Gowun Batang', serif;
    font-size: 11px;
    letter-spacing: 0.35em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 12px;
    opacity: 0.8;
  }

  h1 {
    font-family: 'Gowun Batang', serif;
    font-size: 38px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.02em;
    line-height: 1.1;
  }

  h1 span {
    color: var(--accent);
  }

  .subtitle {
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 10px;
    font-weight: 300;
    letter-spacing: 0.02em;
  }

  /* Input area */
  .add-card {
    width: 100%;
    max-width: 560px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 28px;
    transition: border-color 0.2s;
  }

  .add-card:focus-within {
    border-color: var(--accent);
  }

  .input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  .input-group {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  textarea {
    width: 100%;
    background: transparent;
    border: none;
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 15px;
    font-weight: 400;
    resize: none;
    outline: none;
    line-height: 1.6;
    min-height: 48px;
  }

  textarea::placeholder { color: var(--text-dim); }

  .meta-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  select, input[type="datetime-local"] {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-muted);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 12px;
    padding: 6px 10px;
    outline: none;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
  }

  select:focus, input[type="datetime-local"]:focus {
    border-color: var(--accent);
    color: var(--text);
  }

  input[type="datetime-local"]::-webkit-calendar-picker-indicator {
    filter: invert(0.5);
    cursor: pointer;
  }

  .add-btn {
    width: 44px;
    height: 44px;
    border-radius: 10px;
    background: var(--accent);
    border: none;
    color: var(--bg);
    font-size: 22px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s, transform 0.1s;
    font-weight: 700;
  }

  .add-btn:hover { background: var(--accent2); }
  .add-btn:active { transform: scale(0.95); }

  /* Filter tabs */
  .filter-tabs {
    width: 100%;
    max-width: 560px;
    display: flex;
    gap: 6px;
    margin-bottom: 16px;
  }

  .tab {
    padding: 7px 16px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.02em;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.15s;
  }

  .tab.active {
    background: var(--accent);
    border-color: var(--accent);
    color: var(--bg);
  }

  .tab:hover:not(.active) {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* Stats bar */
  .stats-bar {
    width: 100%;
    max-width: 560px;
    display: flex;
    gap: 16px;
    margin-bottom: 20px;
    padding: 12px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
  }

  .stat {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text-muted);
  }

  .stat-num {
    font-family: 'Gowun Batang', serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
  }

  .stat-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }

  /* Reminder list */
  .list {
    width: 100%;
    max-width: 560px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .reminder-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
    display: flex;
    gap: 14px;
    align-items: flex-start;
    transition: border-color 0.2s, opacity 0.2s;
    animation: slideIn 0.25s ease;
    position: relative;
    overflow: hidden;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .reminder-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    border-radius: 3px 0 0 3px;
    background: var(--accent);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .reminder-card:hover::before { opacity: 1; }
  .reminder-card:hover { border-color: #3a3a42; }

  .reminder-card.done {
    opacity: 0.45;
  }

  .reminder-card.done .reminder-text {
    text-decoration: line-through;
    color: var(--text-muted);
  }

  .reminder-card.overdue::before {
    background: var(--danger);
    opacity: 1;
  }

  .check-btn {
    width: 22px;
    height: 22px;
    border-radius: 6px;
    border: 1.5px solid var(--border);
    background: transparent;
    cursor: pointer;
    flex-shrink: 0;
    margin-top: 1px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    color: transparent;
    font-size: 13px;
  }

  .check-btn:hover {
    border-color: var(--green);
    color: var(--green);
  }

  .reminder-card.done .check-btn {
    background: var(--green);
    border-color: var(--green);
    color: white;
  }

  .reminder-body { flex: 1; min-width: 0; }

  .reminder-text {
    font-size: 14px;
    line-height: 1.6;
    color: var(--text);
    word-break: break-word;
    white-space: pre-wrap;
  }

  .reminder-meta {
    display: flex;
    gap: 8px;
    margin-top: 8px;
    align-items: center;
    flex-wrap: wrap;
  }

  .badge {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 4px;
    font-weight: 500;
    letter-spacing: 0.02em;
  }

  .badge-priority-high { background: rgba(196,92,92,0.2); color: #e07070; }
  .badge-priority-mid  { background: rgba(212,168,83,0.2); color: var(--accent); }
  .badge-priority-low  { background: rgba(106,170,126,0.2); color: var(--green); }

  .due-time {
    font-size: 11px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .due-time.overdue { color: var(--danger); }
  .due-time.soon { color: var(--accent); }

  .del-btn {
    background: transparent;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 16px;
    padding: 2px 4px;
    border-radius: 4px;
    transition: color 0.15s;
    flex-shrink: 0;
    line-height: 1;
  }

  .del-btn:hover { color: var(--danger); }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
  }

  .empty-icon {
    font-size: 40px;
    margin-bottom: 16px;
    opacity: 0.4;
  }

  .empty-text {
    font-family: 'Gowun Batang', serif;
    font-size: 18px;
    color: var(--text-muted);
    margin-bottom: 6px;
  }

  .empty-sub { font-size: 12px; }

  /* Notification banner */
  .notif {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(-80px);
    background: var(--accent);
    color: var(--bg);
    padding: 12px 24px;
    border-radius: 30px;
    font-size: 13px;
    font-weight: 700;
    z-index: 1000;
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    white-space: nowrap;
    max-width: 90vw;
    text-align: center;
  }

  .notif.show { transform: translateX(-50%) translateY(0); }

  /* Divider label */
  .section-label {
    width: 100%;
    max-width: 560px;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin: 8px 0 4px;
    padding-left: 2px;
  }

  .separator { height: 1px; background: var(--border); margin: 12px 0; width: 100%; max-width: 560px; }
</style>
</head>
<body>

<div class="notif" id="notif"></div>

<header>
  <div class="logo-mark">✦ Remember</div>
  <h1>기억<span>해줘</span></h1>
  <div class="subtitle">잊지 말아야 할 것들을 담아두는 곳</div>
</header>

<!-- Add form -->
<div class="add-card">
  <div class="input-row">
    <div class="input-group">
      <textarea id="taskInput" placeholder="기억해야 할 일을 적어주세요..." rows="2"></textarea>
      <div class="meta-row">
        <select id="prioritySelect">
          <option value="mid">🟡 보통</option>
          <option value="high">🔴 중요</option>
          <option value="low">🟢 여유</option>
        </select>
        <input type="datetime-local" id="dueInput">
      </div>
    </div>
    <button class="add-btn" onclick="addReminder()">+</button>
  </div>
</div>

<!-- Filter tabs -->
<div class="filter-tabs">
  <button class="tab active" onclick="setFilter('all', this)">전체</button>
  <button class="tab" onclick="setFilter('pending', this)">미완료</button>
  <button class="tab" onclick="setFilter('done', this)">완료</button>
  <button class="tab" onclick="setFilter('overdue', this)">⚠ 기한초과</button>
</div>

<!-- Stats -->
<div class="stats-bar" id="statsBar"></div>

<!-- List -->
<div class="list" id="list"></div>

<script>
  let reminders = JSON.parse(localStorage.getItem('reminders_v2') || '[]');
  let currentFilter = 'all';

  function save() {
    localStorage.setItem('reminders_v2', JSON.stringify(reminders));
  }

  function showNotif(msg) {
    const el = document.getElementById('notif');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2200);
  }

  function addReminder() {
    const text = document.getElementById('taskInput').value.trim();
    if (!text) { showNotif('내용을 입력해주세요 ✏️'); return; }

    const due = document.getElementById('dueInput').value;
    const priority = document.getElementById('prioritySelect').value;

    reminders.unshift({
      id: Date.now(),
      text,
      due: due || null,
      priority,
      done: false,
      created: new Date().toISOString()
    });

    save();
    document.getElementById('taskInput').value = '';
    document.getElementById('dueInput').value = '';
    render();
    showNotif('저장했어요 ✨');
  }

  function toggleDone(id) {
    const r = reminders.find(r => r.id === id);
    if (r) { r.done = !r.done; save(); render(); }
  }

  function deleteReminder(id) {
    reminders = reminders.filter(r => r.id !== id);
    save(); render();
    showNotif('삭제했어요');
  }

  function setFilter(f, btn) {
    currentFilter = f;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  function isOverdue(r) {
    if (!r.due || r.done) return false;
    return new Date(r.due) < new Date();
  }

  function isSoon(r) {
    if (!r.due || r.done) return false;
    const diff = new Date(r.due) - new Date();
    return diff > 0 && diff < 3600000 * 3; // within 3 hours
  }

  function formatDue(due) {
    if (!due) return null;
    const d = new Date(due);
    const now = new Date();
    const diffMs = d - now;
    const diffH = diffMs / 3600000;

    if (diffMs < 0) {
      const ago = Math.abs(diffMs);
      if (ago < 3600000) return `${Math.floor(ago/60000)}분 전 기한`;
      if (ago < 86400000) return `${Math.floor(ago/3600000)}시간 전 기한`;
      return `${Math.floor(ago/86400000)}일 전 기한`;
    }
    if (diffH < 1) return `${Math.floor(diffMs/60000)}분 후`;
    if (diffH < 24) return `${Math.floor(diffH)}시간 후`;
    if (diffH < 48) return '내일';

    const m = d.getMonth()+1, day = d.getDate();
    const hh = String(d.getHours()).padStart(2,'0');
    const mm = String(d.getMinutes()).padStart(2,'0');
    if (d.getMinutes() === 0) return `${m}/${day} ${hh}시`;
    return `${m}/${day} ${hh}:${mm}`;
  }

  function render() {
    // Stats
    const total = reminders.length;
    const done = reminders.filter(r => r.done).length;
    const overdue = reminders.filter(r => isOverdue(r)).length;
    const pending = total - done;

    document.getElementById('statsBar').innerHTML = `
      <div class="stat"><span class="stat-num">${total}</span> 전체</div>
      <div class="stat"><span class="stat-num" style="color:var(--accent)">${pending}</span> 미완료</div>
      <div class="stat"><span class="stat-num" style="color:var(--green)">${done}</span> 완료</div>
      ${overdue ? `<div class="stat"><span class="stat-num" style="color:var(--danger)">${overdue}</span> 기한초과</div>` : ''}
    `;

    // Filter
    let filtered = reminders;
    if (currentFilter === 'pending') filtered = reminders.filter(r => !r.done);
    else if (currentFilter === 'done') filtered = reminders.filter(r => r.done);
    else if (currentFilter === 'overdue') filtered = reminders.filter(r => isOverdue(r));

    const list = document.getElementById('list');

    if (filtered.length === 0) {
      list.innerHTML = `
        <div class="empty">
          <div class="empty-icon">${currentFilter === 'done' ? '🎉' : '🍃'}</div>
          <div class="empty-text">${currentFilter === 'done' ? '완료된 항목이 없어요' : currentFilter === 'overdue' ? '기한 초과 없어요!' : '아직 비어있어요'}</div>
          <div class="empty-sub">${currentFilter === 'all' ? '위에서 할 일을 추가해보세요' : ''}</div>
        </div>`;
      return;
    }

    // Sort: overdue → high priority → normal → done
    const sorted = [...filtered].sort((a, b) => {
      if (a.done !== b.done) return a.done ? 1 : -1;
      if (isOverdue(a) !== isOverdue(b)) return isOverdue(a) ? -1 : 1;
      const pOrder = { high: 0, mid: 1, low: 2 };
      if (a.priority !== b.priority) return pOrder[a.priority] - pOrder[b.priority];
      return new Date(b.created) - new Date(a.created);
    });

    list.innerHTML = sorted.map(r => {
      const overdueFlag = isOverdue(r);
      const soonFlag = isSoon(r);
      const dueStr = formatDue(r.due);
      const pLabels = { high: '🔴 중요', mid: '🟡 보통', low: '🟢 여유' };
      const pClass = { high: 'badge-priority-high', mid: 'badge-priority-mid', low: 'badge-priority-low' };

      return `
        <div class="reminder-card ${r.done ? 'done' : ''} ${overdueFlag ? 'overdue' : ''}">
          <button class="check-btn" onclick="toggleDone(${r.id})">✓</button>
          <div class="reminder-body">
            <div class="reminder-text">${escapeHtml(r.text)}</div>
            <div class="reminder-meta">
              <span class="badge ${pClass[r.priority]}">${pLabels[r.priority]}</span>
              ${dueStr ? `<span class="due-time ${overdueFlag ? 'overdue' : soonFlag ? 'soon' : ''}">🕐 ${dueStr}</span>` : ''}
            </div>
          </div>
          <button class="del-btn" onclick="deleteReminder(${r.id})">×</button>
        </div>`;
    }).join('');
  }

  function escapeHtml(t) {
    return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // Enter key (Shift+Enter = newline)
  document.getElementById('taskInput').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); addReminder(); }
  });

  // Browser notification permission
  if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission();
  }

  // Check for due reminders every minute
  function checkDue() {
    const now = new Date();
    reminders.forEach(r => {
      if (!r.done && r.due && !r.notified) {
        const diff = new Date(r.due) - now;
        if (diff >= 0 && diff <= 60000) {
          r.notified = true;
          save();
          if (Notification.permission === 'granted') {
            new Notification('기억해줘 ⏰', { body: r.text, icon: '' });
          }
          showNotif(`⏰ 지금이에요! "${r.text.slice(0, 20)}..."`);
        }
      }
    });
  }

  setInterval(checkDue, 30000);
  render();
</script>
</body>
</html>
